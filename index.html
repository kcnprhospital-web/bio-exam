    +'<div class="stat"><b style="color:#dc2626">'+(r.total-r.score)+'</b><small>Wrong</small></div>'
    +'<div class="stat"><b>'+grade+'</b><small>Grade</small></div>'
    +'<div class="stat"><b style="font-size:15px">'+r.time+'</b><small>Time</small></div>'
    +'</div></div>'
    +(breakdownRows?'<h2>Lecture Breakdown</h2><table><tr><th>Lecture</th><th style="text-align:center">Score</th><th style="text-align:center">Pct</th></tr>'+breakdownRows+'</table>':'')
    +(reviewRows?'<h2>Question Review</h2>'+reviewRows:'')
    +'<div style="margin-top:24px;text-align:center;color:#aaa;font-size:11px">Kampong Chhnang Provincial Hospital | Nursing Education | Generated '+new Date().toLocaleString()+'</div>'
    +'</body></html>';
}

function downloadStudentReport(r){
  var html=generateStudentReportHTML(r,null,null);
  var blob=new Blob([html],{type:'text/html'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='Report_'+(r.studentName||'Student').replace(/[^a-zA-Z0-9]/g,'_')+'_'+(r.examCode||'exam')+'_'+new Date().toISOString().slice(0,10)+'.html';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
}

function downloadComprehensiveReport(){
  const allResults=Object.values(state.results).sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(allResults.length===0){alert('No submissions yet.');return;}
  const LNAMES={1:'Introduction to Biology',2:'Cell Division',3:'DNA & RNA',4:'Protein Synthesis',5:'Overview of Genes',6:'Sex Linkage',7:'Sex Chromosome',8:'Exceptions to Mendelian Genetics',9:'Gene Pairing',10:'Crisis of Human Gene Selection',11:'Overview of Biotechnology',12:'Traits'};
  const examStats={};
  allResults.forEach(r=>{
    if(!examStats[r.examCode]){examStats[r.examCode]={name:r.examName||r.examCode,total:0,passed:0,scores:[]};}
    examStats[r.examCode].total++;
    if(r.pass) examStats[r.examCode].passed++;
    examStats[r.examCode].scores.push(r.pct);
  });
  const summaryRows=Object.entries(examStats).map(([code,s])=>{
    const avg=Math.round(s.scores.reduce((a,b)=>a+b,0)/s.scores.length);
    const pr=Math.round(s.passed/s.total*100);
    const color=pr>=80?'#16a34a':pr>=60?'#b45309':'#dc2626';
    return `<tr><td style="font-weight:600">${s.name}</td><td style="font-family:monospace;color:#1e40af">${code}</td><td align="center">${s.total}</td><td align="center"><b style="color:#16a34a">${s.passed}</b></td><td align="center"><b style="color:#dc2626">${s.total-s.passed}</b></td><td align="center"><b style="color:${color}">${pr}%</b></td><td align="center">${avg}%</td></tr>`;
  }).join('');
  const studentRows=allResults.map((r,i)=>{
    const grade=r.pct>=90?'A':r.pct>=80?'B':r.pct>=70?'C':r.pct>=60?'D':'F';
    return `<tr style="background:${i%2===0?'#fff':'#f8fafc'}"><td>${i+1}</td><td style="font-weight:600">${r.studentName||'—'}</td><td style="color:#666">${r.studentId||'—'}</td><td style="font-family:monospace;font-size:11px;color:#1e40af">${r.examCode||'—'}</td><td align="center">${r.score}/${r.total}</td><td align="center"><b>${r.pct}%</b></td><td align="center"><b>${grade}</b></td><td align="center"><span style="padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;background:${r.pass?'#dcfce7':'#fee2e2'};color:${r.pass?'#16a34a':'#dc2626'}">${r.pass?'PASS':'FAIL'}</span></td><td style="color:#666;font-size:11px">${r.time||'—'}</td><td style="color:#666;font-size:11px">${r.date||'—'}</td><td><button onclick="downloadStudentReport(allResults[${allResults.indexOf(r)}])" style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);color:#93c5fd;font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer">⬇️ PDF</button></td></tr>`;
  }).join('');
  const totalPassed=allResults.filter(r=>r.pass).length;
  const overallAvg=Math.round(allResults.reduce((a,r)=>a+r.pct,0)/allResults.length);
  const overallPassRate=Math.round(totalPassed/allResults.length*100);
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>KCPH Biology — Comprehensive Report</title>
  <style>body{font-family:Arial,sans-serif;padding:24px;max-width:960px;margin:0 auto;color:#111;font-size:13px}
  h1{color:#1e40af;font-size:22px;margin-bottom:2px}.subtitle{color:#666;font-size:13px;margin-bottom:24px}
  .kpi-row{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
  .kpi{border:2px solid #e5e7eb;border-radius:10px;padding:16px 24px;text-align:center;flex:1;min-width:120px}
  .kpi b{font-size:32px;display:block;color:#1e40af}.kpi small{font-size:11px;color:#666}
  h2{font-size:15px;font-weight:700;margin:24px 0 10px;color:#1e40af;border-bottom:2px solid #e5e7eb;padding-bottom:6px}
  table{width:100%;border-collapse:collapse;margin-bottom:24px;font-size:12px}
  th{background:#1e40af;color:white;padding:9px 10px;text-align:left}
  td{padding:8px 10px;border-bottom:1px solid #e5e7eb}
  .footer{margin-top:32px;text-align:center;color:#aaa;font-size:11px;border-top:1px solid #e5e7eb;padding-top:16px}
  @media print{.no-print{display:none}body{padding:12px}}</style></head><body>
  <div class="no-print" style="margin-bottom:20px">
    <button onclick="window.print()" style="background:#1e40af;color:white;border:none;padding:11px 24px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700">🖨️ Print / Save as PDF</button>
    <span style="margin-left:12px;color:#666;font-size:12px">In print dialog → choose "Save as PDF"</span>
  </div>
  <h1>KCPH Nursing Biology — Comprehensive Exam Report</h1>
  <div class="subtitle">Generated: ${new Date().toLocaleString()} · Total submissions: ${allResults.length}</div>
  <div class="kpi-row">
    <div class="kpi"><b>${allResults.length}</b><small>Total Submissions</small></div>
    <div class="kpi"><b style="color:#16a34a">${totalPassed}</b><small>Passed</small></div>
    <div class="kpi"><b style="color:#dc2626">${allResults.length-totalPassed}</b><small>Failed</small></div>
    <div class="kpi"><b style="color:${overallPassRate>=60?'#16a34a':'#dc2626'}">${overallPassRate}%</b><small>Pass Rate</small></div>
    <div class="kpi"><b>${overallAvg}%</b><small>Average Score</small></div>
  </div>
  <h2>📋 Exam Summary by Code</h2>
  <table><tr><th>Exam Name</th><th>Code</th><th>Students</th><th>Passed</th><th>Failed</th><th>Pass Rate</th><th>Avg Score</th></tr>${summaryRows}</table>
  <h2>📝 All Student Results</h2>
  <table><tr><th>#</th><th>Name</th><th>ID</th><th>Exam Code</th><th>Score</th><th>Percentage</th><th>Grade</th><th>Result</th><th>Time</th><th>Date</th></tr>${studentRows}</table>
  <div class="footer">Kampong Chhnang Provincial Hospital · Nursing Education · Biology Exam Platform</div>
  </body></html>`;
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='KCPH_Biology_Comprehensive_Report_'+new Date().toISOString().slice(0,10)+'.html';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

// Long press on key icon (1 second) also opens admin login
(function(){
  var el, pressTimer;
  function startPress(){ pressTimer=setTimeout(function(){ openAdminLoginModal(); }, 1000); }
  function cancelPress(){ clearTimeout(pressTimer); }
  document.addEventListener('DOMContentLoaded', function(){
    el=document.getElementById('fab-key');
    if(el){
      el.addEventListener('mousedown', startPress);
      el.addEventListener('touchstart', function(e){ e.preventDefault(); startPress(); }, {passive:false});
      el.addEventListener('mouseup', cancelPress);
      el.addEventListener('mouseleave', cancelPress);
      el.addEventListener('touchend', cancelPress);
    }
  });
})();
</script>
