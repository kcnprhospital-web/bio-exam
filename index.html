<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060d1a">
<title>Biology Exam Platform · KCPH</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:'DM Sans',system-ui,sans-serif;background:#060d1a;color:#e2e8f0;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
input,button,select,textarea{font-family:inherit}
button{cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{outline:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:4px}
:root{
  --bg:#060d1a;--bg2:#0a1628;--bg3:#0f1f35;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.12);
  --text:#e2e8f0;--text2:#94a3b8;--text3:#475569;--text4:#1e3a5f;
  --blue:#0ea5e9;--blue-dim:rgba(14,165,233,0.12);--blue-border:rgba(14,165,233,0.25);
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;--purple:#a855f7;--orange:#f97316;
}
.screen{display:none;min-height:100vh;animation:fadeIn .25s ease}
.screen.active{display:block}
#screen-exam.active{display:flex;flex-direction:column}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.dots-bg{position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(circle,rgba(14,165,233,0.06) 1px,transparent 1px);background-size:28px 28px;z-index:0}
/* ── COMMON ── */
.card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px;padding:24px}
.section-label{color:#334155;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.btn-primary{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#0284c7,#7c3aed);color:#fff;font-weight:800;font-size:15px;box-shadow:0 8px 24px rgba(2,132,199,0.28);transition:transform .15s,opacity .15s}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.btn-secondary{padding:9px 18px;border-radius:9px;border:1.5px solid var(--border);background:rgba(255,255,255,0.03);color:#64748b;font-size:13px;font-weight:700;transition:all .15s}
.btn-danger{padding:9px 18px;border-radius:9px;border:none;background:rgba(239,68,68,0.15);color:#f87171;font-size:13px;font-weight:700}
.form-label{display:block;color:#94a3b8;font-size:12px;font-weight:600;margin-bottom:6px}
.form-input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);background:rgba(255,255,255,0.04);color:#e2e8f0;font-size:15px;transition:border-color .2s}
.form-input:focus{border-color:var(--blue)}
.form-input::placeholder{color:#1e3a5f}
.form-input.err{border-color:rgba(239,68,68,0.5)}
.error-box{color:#f87171;font-size:13px;padding:10px 12px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;margin-bottom:14px;display:none}
.error-box.show{display:block}
/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,13,26,0.92);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal-card{background:#0a1628;border:1px solid var(--border2);border-radius:20px;padding:28px 24px;max-width:420px;width:100%;animation:fadeIn .2s ease}
/* ── REGISTER ── */
#screen-register{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;min-height:100vh;position:relative}
.register-wrap{width:100%;max-width:480px;position:relative;z-index:1}
.brand-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(14,165,233,0.1);border:1px solid rgba(14,165,233,0.2);border-radius:100px;padding:6px 16px;margin-bottom:20px}
.brand-pill span{color:#7dd3fc;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
/* ── EXAM ── */
.progress-bar-wrap{height:3px;background:#0f1f35;flex-shrink:0}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .3s}
.exam-body{flex:1;overflow-y:auto;padding:20px 16px 100px;max-width:700px;margin:0 auto;width:100%}
.lecture-tag{display:inline-flex;align-items:center;gap:6px;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;margin-bottom:14px}
.option-btn{width:100%;padding:13px 14px;border-radius:11px;border:2px solid var(--border);background:rgba(255,255,255,0.03);color:#94a3b8;display:flex;align-items:center;gap:12px;text-align:left;transition:all .15s;font-size:14px;line-height:1.5}
.option-btn.selected{background:var(--opt-bg);border-color:var(--opt-color);color:var(--opt-color)}
.opt-label{width:30px;height:30px;border-radius:7px;flex-shrink:0;background:rgba(255,255,255,0.05);color:#475569;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;transition:all .15s}
.option-btn.selected .opt-label{background:rgba(255,255,255,0.15);color:inherit}
.nav-dot{width:30px;height:30px;border-radius:7px;border:2px solid rgba(255,255,255,0.06);background:transparent;color:#1e3a5f;font-size:10px;font-weight:700;transition:all .15s}
.nav-dot.answered{border-color:rgba(34,197,94,0.35);background:rgba(34,197,94,0.07);color:#86efac}
.nav-dot.current{border-color:#0ea5e9;background:rgba(14,165,233,0.18);color:#7dd3fc}
/* ── REPORT ── */
.score-hero{border-radius:20px;padding:28px 20px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
.tab-btn{padding:9px 16px;border-radius:8px;font-size:13px;font-weight:700;border:1.5px solid var(--border);background:transparent;color:#475569;transition:all .15s}
.tab-btn.active{border-color:rgba(14,165,233,0.45);background:rgba(14,165,233,0.1);color:#7dd3fc}
.tab-content{display:none}
.tab-content.active{display:block}
.bar-track{height:7px;background:#0f1f35;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 1.2s cubic-bezier(.16,1,.3,1)}
/* ── ADMIN ── */
.admin-section{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.admin-section-title{color:#7dd3fc;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.exam-config-card{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;transition:border-color .2s}
.exam-config-card:hover{border-color:rgba(14,165,233,0.25)}
.lec-toggle{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer}
.lec-toggle:last-child{border-bottom:none}
.lec-toggle input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#0ea5e9}
.results-table{width:100%;border-collapse:collapse;min-width:520px}
.results-table th{background:rgba(255,255,255,0.03);padding:9px 12px;text-align:left;font-size:10px;color:#334155;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;white-space:nowrap}
.results-table td{padding:11px 12px;border-top:1px solid rgba(255,255,255,0.04);font-size:13px;vertical-align:middle}
.badge-pass{color:#86efac;font-weight:800;font-size:12px}
.badge-fail{color:#fca5a5;font-weight:800;font-size:12px}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700}
/* ── REVIEW ── */
.review-item{border-radius:14px;padding:14px;margin-bottom:10px}
.review-item.wrong{background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.15)}
.review-item.correct{background:rgba(34,197,94,0.05);border:1px solid rgba(34,197,94,0.15)}
.review-opt{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:8px;font-size:12px}
.review-opt.correct-opt{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);color:#86efac}
.review-opt.wrong-opt{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#fca5a5}
.review-opt.neutral{color:#334155;border:1px solid transparent}
/* ── ADMIN LOGIN ── */
.admin-fab{position:fixed;bottom:16px;right:16px;z-index:300;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.admin-login-panel{background:#0a1628;border:1px solid var(--border2);border-radius:12px;padding:12px;display:none;flex-direction:column;gap:8px;width:230px;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.admin-login-panel.show{display:flex}
.admin-code-input{width:100%;padding:9px 10px;border-radius:8px;border:1.5px solid var(--border);background:rgba(255,255,255,0.05);color:#e2e8f0;font-size:13px}
.admin-code-input.shake{animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.btn-key{width:36px;height:36px;border-radius:9px;border:1px solid rgba(255,255,255,0.06);background:rgba(6,13,26,0.85);color:#1e3a5f;font-size:16px;backdrop-filter:blur(8px)}
/* ── PRINT ── */
@media print{
  body{background:#fff!important;color:#000!important}
  .no-print{display:none!important}
  .screen{display:none!important}
  #screen-report{display:block!important}
  .score-hero{background:#f0f9ff!important;border:2px solid #0284c7!important}
}
/* ── UTILS ── */
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-8{gap:8px}.gap-10{gap:10px}.gap-12{gap:12px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-20{margin-top:20px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.text-center{text-align:center}.text-sm{font-size:13px}.text-xs{font-size:11px}.text-2xs{font-size:10px}
.font-bold{font-weight:700}.font-black{font-weight:900}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── PRINT STYLES ─────────────────────────────────── */
@media print {
  body { background: #fff !important; color: #000 !important; }
  #loading-overlay,
  .no-print,
  #admin-fab,
  .tab-btn,
  button { display: none !important; }
  .screen { display: none !important; }
  #screen-report { display: block !important; padding: 0 !important; }
  .report-card { background: #fff !important; border: 1px solid #ccc !important; color: #000 !important; page-break-inside: avoid; }
  .result-hero { background: #f0f0f0 !important; color: #000 !important; }
  .tab-content { display: block !important; }
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>

</div>
<div class="dots-bg"></div>
<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIGURATION
// ═══════════════════════════════════════════════════════════════════
const ADMIN_CODE = "KCPH-ADMIN";

// ═══════════════════════════════════════════════════════════════════
// LECTURE METADATA
// ═══════════════════════════════════════════════════════════════════
const LECTURES = {
  1:{name:"Introduction to Biology",     color:"#0ea5e9",bg:"rgba(14,165,233,0.12)",dark:"#0c2a3f"},

  7:{name:"Sex Chromosome",              color:"#22c55e",bg:"rgba(34,197,94,0.12)", dark:"#0a2e18"},
  8:{name:"Exceptions to Mendelian",     color:"#a855f7",bg:"rgba(168,85,247,0.12)",dark:"#1e0a3c"},
  9:{name:"Gene Pairing",                color:"#f97316",bg:"rgba(249,115,22,0.12)",dark:"#2d1505"},
  10:{name:"Crisis: Human Gene Selection",color:"#eab308",bg:"rgba(234,179,8,0.12)",dark:"#2a1f05"},
  11:{name:"Overview of Biotechnology",  color:"#0ea5e9",bg:"rgba(14,165,233,0.12)",dark:"#0c2a3f"},
  12:{name:"Human Traits",               color:"#22c55e",bg:"rgba(34,197,94,0.12)", dark:"#0a2e18"},
};

// ═══════════════════════════════════════════════════════════════════
// ALL 180 QUESTIONS
// ═══════════════════════════════════════════════════════════════════
const ALL_QS = [
  // L1
  {l:1,q:"What is the fundamental building block of all living organisms, including the human body?",o:["Tissue","Organ","Cell","Nucleus"],a:2},
  {l:1,q:"Which organelle is primarily responsible for energy production in the cell?",o:["Nucleus","Ribosome","Cell membrane","Mitochondria"],a:3},
  {l:1,q:"Where does protein synthesis take place within the cell?",o:["Mitochondria","Ribosomes","Cytoplasm","Nucleus"],a:1},
  {l:1,q:"Which biological molecule is the primary source of energy for the body?",o:["Lipids","Proteins","Nucleic acids","Carbohydrates"],a:3},
  {l:1,q:"Enzymes function in the body primarily as:",o:["Structural components of cell membranes","Genetic information carriers","Biological catalysts that speed up chemical reactions","Energy storage molecules"],a:2},
  {l:1,q:"Which level of biological organization comes directly ABOVE the tissue level?",o:["Cell","Organ system","Organ","Organism"],a:2},
  {l:1,q:"The body's ability to maintain a stable internal environment despite external changes is known as:",o:["Metabolism","Homeostasis","Catabolism","Osmosis"],a:1},
  {l:1,q:"Which organ system is primarily responsible for gas exchange in the human body?",o:["Digestive system","Urinary system","Respiratory system","Cardiovascular system"],a:2},
  {l:1,q:"A nursing student observes a patient with an abnormally elevated blood glucose level. This represents a failure of which physiological process?",o:["Gas exchange","Homeostatic regulation","Cell division","Protein synthesis"],a:1},
  {l:1,q:"Which type of biological molecule stores genetic information in the cell?",o:["Carbohydrates","Lipids","Proteins","Nucleic acids (DNA and RNA)"],a:3},
  {l:1,q:"The cell membrane serves which of the following functions?",o:["Controls what enters and exits the cell","Produces energy for the cell","Synthesizes proteins for the cell","Stores genetic material"],a:0},
  {l:1,q:"Which of the following is an example of a POSITIVE feedback loop in the body?",o:["Blood glucose regulation by insulin","Body temperature regulation by sweating","Uterine contractions intensifying during childbirth","Blood pressure lowering through vasodilation"],a:2},
  {l:1,q:"Which type of microorganism requires a living host cell to replicate and CANNOT reproduce independently?",o:["Bacteria","Fungi","Parasite","Virus"],a:3},
  {l:1,q:"Which organ system is responsible for the production and regulation of hormones?",o:["Nervous system","Endocrine system","Lymphatic system","Integumentary system"],a:1},
  {l:1,q:"A nurse performing hand hygiene before a clinical procedure is applying principles from which area of biology?",o:["Biochemistry","Cell biology","Infection control / Microbiology","Anatomy"],a:2},
  // L2
  {l:2,q:"What are the two main types of cell division relevant to human biology?",o:["Mitosis and Cytokinesis","Mitosis and Meiosis","Prophase and Anaphase","Replication and Transcription"],a:1},
  {l:2,q:"Mitosis occurs in which type of cells?",o:["Germ cells only","Sex cells (sperm and egg)","Somatic cells (all body cells except sex cells)","Red blood cells only"],a:2},

  {l:2,q:"During Anaphase of mitosis, which event occurs?",o:["Chromosomes condense and become visible","A new nuclear envelope forms around each chromosome set","Sister chromatids separate and are pulled to opposite poles of the cell","Chromosomes line up along the equator"],a:2},
  {l:2,q:"Cytokinesis refers to:",o:["The duplication of DNA before cell division","The division of the cytoplasm into two separate daughter cells","The formation of spindle fibers","The separation of homologous chromosomes"],a:1},

  {l:2,q:"A patient undergoes surgery for a wound. Which process is primarily responsible for tissue repair and skin regeneration?",o:["Meiosis","Mitosis","Crossing over","Nondisjunction"],a:1},
  {l:2,q:"The goal of meiosis is to produce:",o:["Two genetically identical daughter cells with 46 chromosomes","Four genetically unique gametes, each with 23 chromosomes","Two haploid somatic cells","Four diploid daughter cells"],a:1},
  {l:2,q:"Crossing over, which contributes to genetic diversity, occurs during which phase of meiosis?",o:["Metaphase I","Anaphase II","Prophase I","Telophase II"],a:2},
  {l:2,q:"Which division of meiosis is described as the 'Reductional Division'?",o:["Meiosis II","Cytokinesis II","Meiosis I","Prophase II"],a:2},

  {l:2,q:"Down syndrome is caused by which chromosomal abnormality?",o:["Deletion of chromosome 21","Trisomy 21 (an extra copy of chromosome 21)","Monosomy of chromosome 23","Inversion of chromosome 18"],a:1},
  {l:2,q:"A nurse explains why chemotherapy causes hair loss and GI problems. Which concept BEST explains this?",o:["Chemotherapy targets only cancer cells during meiosis","Chemotherapy disrupts crossing over in germ cells","Chemotherapy targets rapidly dividing cells, affecting hair follicles and gut lining as well as cancer cells","Chemotherapy prevents cytokinesis in somatic cells only"],a:2},

  {l:3,q:"Which BEST describes the overall structure of a DNA molecule?",o:["Single-stranded linear chain","Double-stranded helix resembling a twisted ladder","Single-stranded circular loop","Triple-stranded helix"],a:1},

  {l:3,q:"According to base-pairing rules in DNA, Adenine (A) always pairs with:",o:["Cytosine (C)","Guanine (G)","Uracil (U)","Thymine (T)"],a:3},
  {l:3,q:"Which nitrogenous base is found in DNA but NOT in RNA?",o:["Adenine (A)","Uracil (U)","Thymine (T)","Guanine (G)"],a:2},
  {l:3,q:"The 'sides of the ladder' in the DNA double helix are formed by:",o:["Hydrogen bonds between nitrogenous bases","Alternating deoxyribose sugar and phosphate groups","Pairs of nitrogenous bases","Amino acid chains"],a:1},
  {l:3,q:"'Antiparallel' in DNA structure means:",o:["Both strands run in the same 5' to 3' direction","The two DNA strands run in opposite directions (one 5'→3', the other 3'→5')","DNA and RNA strands always run parallel","The nitrogenous bases face outward from the helix"],a:1},
  {l:3,q:"DNA directs protein synthesis:",o:["Directly at the ribosomes in the cytoplasm","By leaving the nucleus and travelling to ribosomes itself","Indirectly, by first being transcribed into RNA","By binding directly to amino acids"],a:2},

  {l:3,q:"Which is a key structural difference between RNA and DNA?",o:["RNA contains deoxyribose sugar; DNA contains ribose sugar","RNA is double-stranded; DNA is single-stranded","RNA contains ribose sugar and uracil instead of deoxyribose and thymine","RNA contains four nitrogenous bases; DNA contains only three"],a:2},
  {l:3,q:"In RNA, which nitrogenous base replaces Thymine (T) and pairs with Adenine (A)?",o:["Cytosine (C)","Guanine (G)","Uracil (U)","Thymine (T)"],a:2},
